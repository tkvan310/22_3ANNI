<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200">
    <title>Luxury Portfolio & Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />
    <style>
        html, body {
            background-color: #000000;
            color: #f8fafc;
            font-family: "Playfair Display", serif;
            /* Khóa cứng chiều rộng 1200px */
            min-width: 1200px; 
            width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
        }

        /* Đảm bảo Container luôn cố định */
        .container {
            width: 1200px !important;
            max-width: 1200px !important;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- HIỆU ỨNG NỔI ẢNH --- */
        .reveal-on-scroll {
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal-on-scroll.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .cursive { font-family: "Dancing Script", cursive; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }

        .royal-line {
            height: 1px;
            background: linear-gradient(to right, transparent, #aa771c, transparent);
            width: 100%;
            margin: 2rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .royal-ornament {
            position: absolute;
            background: #000000;
            padding: 0 20px;
            color: #aa771c;
        }

        .heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.4);
            top: 0;
            font-size: 100px;
            animation: moveHearts 5s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes moveHearts {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        #music-btn {
            position: fixed;
            bottom: 18px;
            right: 18px; 
            background: rgba(255, 255, 255, 0.85);
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 20px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            z-index: 999;
            backdrop-filter: blur(6px);
        }
    </style>
</head>
<body class="antialiased">
    <header class="text-gray-400 bg-black/80 backdrop-blur-md body-font fixed w-[1200px] z-50 top-0 border-b border-white/10">
      <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
        <a class="flex title-font font-medium items-center text-white mb-4 md:mb-0">
          <span class="ml-3 text-2xl cursive text-indigo-500">anh cưngg</span>
        </a>
        <nav class="md:ml-auto md:mr-auto flex flex-wrap items-center text-sm uppercase tracking-widest justify-center">
          <a href="#" class="mr-8 hover:text-white transition">Ảnh</a>
          <a href="#" class="mr-8 hover:text-white transition">Nổi bật</a>
          <a href="#" class="mr-8 hover:text-white transition">Kỷ niệm</a>
          <a href="#" class="hover:text-white transition">Hứa hẹn</a>
        </nav>
        <button class="inline-flex items-center bg-indigo-600 border-0 py-2 px-6 focus:outline-none hover:bg-indigo-700 rounded-full text-white mt-4 md:mt-0 transition-all shadow-lg shadow-indigo-500/20 text-sm font-bold">
          Get Started
        </button>
      </div>
    </header>

    <section class="pt-32 pb-5 mx-auto container px-5">
      <div class="flex flex-col text-center w-full pt-40 mb-16">
        <h2 class="text-indigo-400 tracking-widest font-medium title-font mb-2 cursive text-3xl">Scrapbooks cho anh Kiên</h2>
        <h1 class="text-6xl font-bold title-font text-white uppercase tracking-tighter mb-4">Kỷ niệm <span class="italic font-light">𝟙 year</span></h1>
        <div class="h-1 w-20 bg-indigo-500 mx-auto rounded"></div>
      </div>
      
      <div class="royal-line">
        <div class="royal-ornament">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L10.5 8.5L4 10L10.5 11.5L12 18L13.5 11.5L20 10L13.5 8.5L12 2Z"/></svg>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-6 pt-20">
        <div class="relative group overflow-hidden rounded-2xl aspect-[4/5] border border-white/5">
          <img alt="art" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="anh11.png" />
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
          <div class="absolute bottom-0 p-8 w-full transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
            <p class="text-indigo-400 text-sm mb-2 cursive text-xl">Bức ảnh đầu tiên</p>
            <h3 class="text-2xl font-bold text-white mb-2">23-2</h3>
            <p class="text-gray-400 text-sm opacity-0 group-hover:opacity-100 transition-opacity duration-500 leading-relaxed">Mấy hôm đầu gặp nhau đáng yêu anh nhỉ ?</p>
          </div>
        </div>
        <div class="relative group overflow-hidden rounded-2xl aspect-[4/5] border border-white/5">
          <img alt="luxury" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="link_anh_3.jpg" />
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
          <div class="absolute bottom-0 p-8 w-full transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
            <p class="text-indigo-400 text-sm mb-2 cursive text-xl">FIRST MESSAGES</p>
            <h3 class="text-2xl font-bold text-white mb-2">Hồi đấy anh trẻ con thế</h3>
            <p class="text-gray-400 text-sm opacity-0 group-hover:opacity-100 transition-opacity duration-500">nhưng mà cũng kiuuuu</p>
          </div>
        </div>
        <div class="relative group overflow-hidden rounded-2xl aspect-[4/5] border border-white/5">
          <img alt="vintage" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="anh12.png" />
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
          <div class="absolute bottom-0 p-8 w-full transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
            <p class="text-indigo-400 text-sm mb-2 cursive text-xl">First Date</p>
            <h3 class="text-2xl font-bold text-white mb-2">Hôm đấy anh run còn quên hết cả kịch bản</h3>
            <p class="text-gray-400 text-sm opacity-0 group-hover:opacity-100 transition-opacity duration-500">Hahaha, nhưng nhẫn đẹp lắm.</p>
          </div>
        </div>
      </div>
    </section>

    <button id="music-btn">🔈</button>
    <audio id="bgm" loop>
      <source src="nhacnen2.mp3" type="audio/mpeg" />
    </audio>

    <script>
      // 1. Hiệu ứng trái tim
      function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "♥";
        heart.style.left = Math.random() * 1200 + "px"; // Rơi trong phạm vi 1200px
        heart.style.animationDuration = Math.random() * 3 + 2 + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
      }
      setInterval(createHeart, 300);

      // 2. Điều khiển nhạc
      const music = document.getElementById("bgm");
      const btn = document.getElementById("music-btn");
      let playing = false;
      btn.onclick = () => {
        if (!playing) { music.play(); btn.innerText = "🔊"; } 
        else { music.pause(); btn.innerText = "🔈"; }
        playing = !playing;
      };

      // 3. HIỆU ỨNG NỔI ẢNH TỰ ĐỘNG (Scroll Reveal)
      document.addEventListener("DOMContentLoaded", function() {
        // Tự động tìm tất cả ảnh và thêm class hiệu ứng
        const allImages = document.querySelectorAll('img');
        allImages.forEach(img => img.classList.add('reveal-on-scroll'));

        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
            }
          });
        }, observerOptions);

        allImages.forEach(img => observer.observe(img));
      });
    </script>
</body>
</html>
